<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>张龙江的健康证明-电子健康证查询</title>
        <style>
            body,html {
                overflow-x: hidden
            }

            body {
                margin: 0;
                padding: 0;
                font-size: 12px;
                padding-bottom: 40px
            }

            .hosp-intro,.other-intro {
                padding: 10px
            }

            .hosp-intro img,.other-intro img {
                width: 100%
            }

            .cardinfo {
                display: flex;
                justify-content: center;
                margin: 20px 0 20px 0;
                font-size: 14px
            }

            .cardinfo .card {
                width: 350px;
                height: 220px;
                position: relative
            }

            .card .info {
                width: 260px;
                padding: 0 10px;
                position: absolute;
                z-index: 999
            }

            .card .card-bg {
                position: absolute;
                width: 350px;
                height: 220px;
                z-index: 1;
                left: 0;
                top: 0;
                border-radius: 10px
            }

            a {
                text-decoration: none
            }

            .card .bh {
                white-space: nowrap
            }

            .card .info * {
                font-weight: bold;
                font-size: 14px;
                font-family: "仿宋",FangSong,STFangsong,serif
            }

            .card .xm span {
                display: inline-block;
                width: calc(50%)
            }

            .card .info div {
                margin-bottom: 5px
            }

            .card .headimg {
                position: absolute;
                right: 12px;
                top: 45px;
                width: 80px;
                height: 100px;
                z-index: 999;
                border-radius: 10px 10px 10px 10px
            }

            .cardinfo .hosp {
                position: absolute;
                bottom: 7px;
                margin-left: 10px;
                color: #fff;
                z-index: 999
            }

            .page-foot {
                position: fixed;
                bottom: 0;
                width: 100%;
                display: flex;
                justify-content: space-around;
                height: 50px;
                line-height: 50px;
                border-top: 1px solid #f2f2f2;
                text-align: center;
                background-color: #fff
            }

            .page-foot div {
                width: 50%;
                border-right: 1px solid #f2f2f2
            }

            .page-foot div:last-child {
                border-right: 0px
            }

            .cardinfo .ygqimg {
                width: 120px;
                position: absolute;
                right: 100px;
                top: calc(40% - 10px);
                z-index: 1000;
                opacity: 0.7
            }

            .gz {
                background-color: #5bc0de;
                text-align: center;
                padding: 10px 0;
                line-height: 25px
            }

            .gz a {
                background-color: #fff;
                display: inline-block;
                padding: 0 15px;
                border-radius: 15px;
                cursor: pointer;
                position: absolute;
                right: 10px
            }

            .gz a:link {
                color: #000;
                text-decoration: none
            }

            .gz a:visited {
                color: #000;
                text-decoration: none
            }

            .gz a:hover {
                color: #000;
                text-decoration: none
            }

            .gz a:active {
                color: #000;
                text-decoration: none
            }

            .cardpic {
                min-width: 350px
            }

            #qrcode {
                width: 55px;
                height: 55px;
                z-index: 999;
                border-radius: 5px;
                background-color: blue
            }

            .qr-container {
                display: flex;
                align-items: center;
                position: absolute;
                gap: 3px;
                right: 10px;
                top: 155px;
                width: fit-content;
                z-index: 999;
            }

            .vertical-text {
                writing-mode: vertical-rl;
                text-orientation: upright;
                font-size: 10px;
                z-index: 999;
                font-family: "仿宋",FangSong,STFangsong,serif
            }

            #qrcode canvas,#qrcode img {
                width: 100%;
                height: 100%
            }

            #saveToImg {
                color: red;
                margin-left: 20px;
                padding: 10px 0
            }

            .applyyj {
                text-align: center;
                background-color: #eba753;
                color: #ffffff;
                height: 40px;
                line-height: 40px;
                border-radius: 10px;
                width: calc(100% - 80px);
                margin-left: 40px;
                margin-top: 20px
            }

            .showCardImg {
                z-index: 9999999;
                position: fixed;
                height: 100%;
                width: 100%;
                left: 0;
                top: 0;
                display: none
            }

            .showCardImgMask {
                position: fixed;
                z-index: 9998;
                width: 100%;
                height: 100%;
                top: 0;
                left: 0;
                background-color: #515151;
                opacity: 0.4;
                overflow: none;
                display: none
            }

            .showCardImgimg {
                width: 80%;
                margin-left: 10%;
                margin-top: 20%;
                background-color: #FFFFFF;
                border-radius: 10px;
                padding-bottom: 20px
            }

            .showCardImgimg img {
                width: 100%
            }

            .closeModel {
                float: right;
                color: #007AFF;
                padding: 0 20px
            }
        </style>
    </head>
